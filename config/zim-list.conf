# ZIM download list for survive-sync
# Format: slug | kiwix_subdir | description
# slug         = name prefix as it appears on download.kiwix.org
# kiwix_subdir = subdirectory under download.kiwix.org/zim/
#
# sync-zim.sh scrapes https://download.kiwix.org/zim/{kiwix_subdir}/
# finds the newest file whose name starts with {slug}, compares to what
# is already on disk, and downloads only if the version differs.
# Old versions of the same slug are deleted after a successful update.
#
# ── CORE ──────────────────────────────────────────────────────────────────────
wikipedia_en_all_maxi        | wikipedia   | English Wikipedia (full)
wiktionary_en_all_maxi       | wiktionary  | English Wiktionary (full)
#
# ── SIMPLIFIED ────────────────────────────────────────────────────────────────
wikipedia_en_simple_all_maxi | wikipedia   | Simple English Wikipedia
#
# ── MEDICAL / REFERENCE ───────────────────────────────────────────────────────
# Uncomment after verifying slugs at https://library.kiwix.org
#wikipedia_en_medicine_maxi   | wikipedia   | Wikipedia Medicine subset
#medlineplus_en_all           | other        | MedlinePlus health encyclopedia
#
# ── ADD MORE ──────────────────────────────────────────────────────────────────
# stackexchange_cooking_en_all | stackexchange | Cooking Stack Exchange
# gutenberg_en_all             | gutenberg     | Project Gutenberg full library
