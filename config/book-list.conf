# source:
#   gutenberg     = Project Gutenberg (https://www.gutenberg.org/ebooks/{id}.epub.images)
#   standardebooks = Standard Ebooks  (https://standardebooks.org/ebooks/{slug}/downloads/{author}_{title}.epub)
#
# sync-books.sh downloads each EPUB, skips if filename already exists,
# then ingests new files into the Calibre library via `calibredb add`.
