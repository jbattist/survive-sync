# ── NOTES ON MODERN AWARD WINNERS ──────────────────────────────────────────
# RE: Hugo/Nebula/Pulitzer from last 50 years — nearly all winners from
# 1976–2026 remain under copyright and are NOT available on Gutenberg.
# For modern award winners, purchase EPUBs and `calibredb add` manually.
#
# PULITZER (last 50 years):
#   The Road - Cormac McCarthy (2007) ← literally about survival
#   Lonesome Dove - Larry McMurtry (1986) ← frontier grit
#   The Goldfinch - Donna Tartt (2014)
#   All the Light We Cannot See - Anthony Doerr (2015) ← WWII resilience
#   The Underground Railroad - Colson Whitehead (2017)
#   Demon Copperhead - Barbara Kingsolver (2023)
#   James - Percival Everett (2025)
#
# HUGO AWARD (last 50 years):
#   Ender's Game - Orson Scott Card (1986)
#   The Left Hand of Darkness - Ursula K. Le Guin (1970)
#   Dune - Frank Herbert (1966) ← survival, ecology, strategy
#   A Fire Upon the Deep - Vernor Vinge (1993)
#   The Dispossessed - Ursula K. Le Guin (1975)
#   Ancillary Justice - Ann Leckie (2014)
#   The Three-Body Problem - Cixin Liu (2015)
#
# NEBULA AWARD (last 50 years):
#   Parable of the Sower - Octavia Butler (nominee, not winner — essential)
#   The Speed of Dark - Elizabeth Moon (2003)
#   Among Others - Jo Walton (2012)
#   Station Eleven - Emily St. John Mandel (nominee — collapse/survival)
#   Piranesi - Susanna Clarke (2021)
#
# For these, check: libro.fm (DRM-free audiobooks), Google Play Books
# (DRM-free EPUBs), or Tor.com (some free novellas).
# ─────────────────────────────────────────────────────────────────────────────
