# Book download list for survive-sync
# Format (tab-separated):
#   source <TAB> id_or_slug <TAB> local_filename_base <TAB> category <TAB> priority <TAB> title
#
# source:
#   gutenberg     = Project Gutenberg (https://www.gutenberg.org/ebooks/{id}.epub.images)
#   standardebooks = Standard Ebooks  (https://standardebooks.org/ebooks/{slug}/downloads/{author}_{title}.epub)
#
# sync-books.sh downloads each EPUB, skips if filename already exists,
# then ingests new files into the Calibre library via `calibredb add`.
#
# NOTE: Core IDs verified against Project Gutenberg catalog (2026-03).
# Some less-common titles may have shifted IDs — run a dry-run first.
# Run `sync-books.sh --dry-run` to confirm availability before bulk download.
# Quick check: curl -sI "https://www.gutenberg.org/ebooks/{ID}" | head -1
# ─────────────────────────────────────────────────────────────────────────────

