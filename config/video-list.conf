# Video download list for survive-sync
# Format (tab-separated):
#   type <TAB> id_or_url <TAB> category <TAB> subcategory <TAB> title
#
# type:
#   video    = single YouTube video ID
#   playlist = YouTube playlist URL (yt-dlp --playlist-end 20 applied)
#   channel  = YouTube channel URL  (yt-dlp --playlist-end 10 applied)
#
# sync-video.sh downloads with yt-dlp at max 720p, skips already-downloaded
# IDs via yt-dlp's archive file, and logs ADD / SKIP / FAIL per entry.
#
# Output directory: /srv/offline/video/{category}/
#
# NOTE: YouTube video availability changes over time.  Verify IDs if downloads
# fail.  The yt-dlp archive file at /srv/offline/video/.yt-dlp-archive.txt
# prevents re-downloading content that was already fetched.
# ─────────────────────────────────────────────────────────────────────────────

