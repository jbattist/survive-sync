# Map region list for survive-sync
# Format (tab-separated):
#   type <TAB> identifier <TAB> state_slug <TAB> subdir <TAB> description
#
# type:
#   geofabrik  = OSM PBF extract from download.geofabrik.de
#                identifier = path after download.geofabrik.de/
#                e.g.  north-america/us/connecticut
#   usgs_topo  = USGS National Map topo quad PDF download
#                identifier = STATE_ABBR:west,south,east,north (bbox)
#
# state_slug   = short name used for output filenames and mbtileserver service name
# subdir       = subdirectory under /srv/offline/maps/  (local or regional)
#
# sync-maps.sh:
#   1. Downloads each geofabrik PBF if MD5 differs from local copy
#   2. Converts updated PBFs to MBTiles via tilemaker
#   3. Places MBTiles in /srv/offline/maps/tiles/ (served by mbtileserver)
#   4. Downloads USGS topo PDFs to /srv/offline/maps/topo/
# ─────────────────────────────────────────────────────────────────────────────

# ── GEOFABRIK OSM EXTRACTS ────────────────────────────────────────────────────
geofabrik	north-america/us/connecticut	connecticut	local	Connecticut OSM PBF
geofabrik	north-america/us/maine	maine	local	Maine OSM PBF
geofabrik	north-america/us/massachusetts	massachusetts	local	Massachusetts OSM PBF
geofabrik	north-america/us/new-hampshire	new-hampshire	local	New Hampshire OSM PBF
geofabrik	north-america/us/rhode-island	rhode-island	local	Rhode Island OSM PBF
geofabrik	north-america/us/vermont	vermont	local	Vermont OSM PBF
geofabrik	north-america/us/new-york	new-york	regional	New York State OSM PBF

# ── USGS TOPO PDFS ────────────────────────────────────────────────────────────
# USGS TopoView API will be queried for 1:24000 scale quads in each state.
# The sync script fetches the index JSON, then downloads available quads.
# Quads are stored in /srv/offline/maps/topo/{state}/
# identifier = STATE_ABBR:west,south,east,north  (bounding box for TNM API &bbox=)
usgs_topo	CT:-73.7,41.2,-71.7,42.9	connecticut	topo	Connecticut 1:24000 topo quads
usgs_topo	ME:-71.1,43.1,-66.9,47.5	maine	topo	Maine 1:24000 topo quads
usgs_topo	MA:-73.5,41.2,-69.9,42.9	massachusetts	topo	Massachusetts 1:24000 topo quads
usgs_topo	NH:-72.6,42.7,-70.6,45.3	new-hampshire	topo	New Hampshire 1:24000 topo quads
usgs_topo	RI:-71.9,41.1,-71.1,42.0	rhode-island	topo	Rhode Island 1:24000 topo quads
usgs_topo	VT:-73.5,42.7,-71.5,45.3	vermont	topo	Vermont 1:24000 topo quads
usgs_topo	NY:-74.5,40.5,-71.9,45.0	new-york	topo	New York eastern strip (~70mi from VT/MA/CT border)
