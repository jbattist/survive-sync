# PDF source list for survive-sync
# Format (tab-separated):
#   url <TAB> local_filename <TAB> category_dir <TAB> priority <TAB> description
#
# local_filename follows the spec convention: category__source__title__year.pdf
# category_dir   matches /srv/offline/pdfs/ subdirectories from the spec
# priority:      P1 = lifesaving/essential, P2 = high-value, P3 = educational
#
# sync-pdfs.sh downloads each URL, skips if SHA-256 matches the stored hash,
# and logs ADD / SKIP / FAIL per entry.  Failures do not abort the run.
#
# All sources below are public domain, freely licensed, or openly distributed
# by their authoring government agency or NGO.
# ─────────────────────────────────────────────────────────────────────────────

